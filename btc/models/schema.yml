version: 2

models:
  - name: stg_btc
    columns:
      - name: hashkey
        data_tests:
          - unique
          - not_null
  
  - name: stg_btc_outputs
    data_tests:
      - dbt_utils.recency:
          arguments:
            datepart: day
            field: block_timestamp
            interval: 1

  - name: whale_alert
    columns: 
      - name: output_address
        data_tests:
          - assert_valid_btc_address
